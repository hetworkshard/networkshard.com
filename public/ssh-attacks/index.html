<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SSH attack telemetry · networkshard</title>
<meta name="description" content="30 days of SSH brute-force attempts against an exposed Oracle Cloud VM, visualised on a globe." />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="canonical" href="https://networkshard.com/ssh-attacks/" />
<link rel="preconnect" href="https://unpkg.com" />
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/globe.gl@2.32.0/dist/globe.gl.min.js"></script>
<style>
  :root {
    --bg: #02060d;
    --glass: rgba(12, 18, 28, 0.55);
    --glass-2: rgba(20, 28, 40, 0.55);
    --line: rgba(120, 160, 200, 0.14);
    --line-strong: rgba(120, 160, 200, 0.28);
    --text: #dde6f2;
    --dim: #7a8aa3;
    --accent: #ff5b6e;
    --accent-2: #4cc9f0;
    --good: #6ee7b7;
    --warn: #fbbf24;
    --mono: ui-monospace, SFMono-Regular, "JetBrains Mono", Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body {
    font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: radial-gradient(circle at 50% 50%, #050b18 0%, #01030a 70%);
    color: var(--text);
  }

  #globe {
    position: fixed; inset: 0;
    z-index: 0;
  }
  /* dim/vignette over globe to make widgets pop */
  #vignette {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    background:
      radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.55) 90%),
      linear-gradient(90deg, rgba(0,0,0,0.55) 0%, transparent 22%, transparent 78%, rgba(0,0,0,0.55) 100%);
  }

  .rail {
    position: fixed; top: 0; bottom: 0; z-index: 2;
    width: 320px; padding: 20px;
    display: flex; flex-direction: column; gap: 14px;
    pointer-events: none; /* let globe handle drag through gaps */
  }
  .rail.left  { left: 0; }
  .rail.right { right: 0; }
  .rail > * { pointer-events: auto; }

  .panel {
    background: var(--glass);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 8px 24px rgba(0,0,0,0.35);
  }
  .panel h2 {
    margin: 0 0 10px;
    font-size: 10.5px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--dim);
  }

  /* title */
  .title h1 {
    margin: 0 0 6px;
    font-size: 17px; font-weight: 600; letter-spacing: -0.005em;
  }
  .title .dot {
    display: inline-block; width: 8px; height: 8px;
    background: var(--accent); border-radius: 50%; margin-right: 9px;
    vertical-align: 2px;
    box-shadow: 0 0 0 0 var(--accent), 0 0 10px var(--accent);
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,91,110,0.55), 0 0 10px rgba(255,91,110,0.8); }
    100% { box-shadow: 0 0 0 14px rgba(255,91,110,0), 0 0 10px rgba(255,91,110,0.8); }
  }
  .title .meta {
    color: var(--dim); font-family: var(--mono); font-size: 11px;
    line-height: 1.6;
  }
  .title .meta strong { color: var(--text); font-weight: 500; }

  /* stats 2x2 */
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat { background: var(--glass-2); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; }
  .stat .num {
    font-family: var(--mono); font-size: 22px; font-weight: 600;
    line-height: 1.1; color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .stat .num.accent { color: var(--accent); }
  .stat .num.good { color: var(--good); }
  .stat .label { color: var(--dim); font-size: 10px; margin-top: 4px; letter-spacing: 0.06em; text-transform: uppercase; }

  /* tables */
  table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 11.5px; }
  th, td { text-align: left; padding: 5px 4px; border-bottom: 1px solid var(--line); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  th { color: var(--dim); font-weight: 500; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; padding-bottom: 7px; }
  td.n { text-align: right; color: var(--accent); font-variant-numeric: tabular-nums; }
  td .flag { margin-right: 6px; }
  td .ip { color: var(--accent-2); }

  /* feed */
  .feed {
    flex: 1; overflow: hidden; position: relative;
    font-family: var(--mono); font-size: 11px;
    -webkit-mask-image: linear-gradient(180deg, transparent 0, #000 24px, #000 calc(100% - 24px), transparent 100%);
            mask-image: linear-gradient(180deg, transparent 0, #000 24px, #000 calc(100% - 24px), transparent 100%);
  }
  .feed-inner { position: absolute; inset: 0; overflow-y: auto; padding-right: 6px; }
  .feed-inner::-webkit-scrollbar { width: 4px; }
  .feed-inner::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 2px; }
  .feed-row {
    padding: 5px 0; border-bottom: 1px dotted var(--line);
    display: grid; grid-template-columns: 50px 1fr; gap: 8px; align-items: baseline;
    animation: fadein 0.5s ease;
  }
  @keyframes fadein { from { opacity: 0; transform: translateX(6px); } to { opacity: 1; transform: none; } }
  .feed-row .t { color: var(--dim); }
  .feed-row .ip { color: var(--accent-2); }
  .feed-row .u { color: var(--warn); }
  .feed-row .c { color: var(--dim); }

  /* users pills wrap */
  .users { display: flex; flex-wrap: wrap; gap: 6px; }
  .users .pill {
    background: var(--glass-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px 10px;
    font-family: var(--mono); font-size: 11px;
    color: var(--text);
  }
  .users .pill .n { color: var(--accent); margin-left: 5px; }

  /* sparkline strip at bottom-center */
  .sparkline {
    position: fixed; left: 50%; bottom: 14px; transform: translateX(-50%);
    z-index: 2;
    width: clamp(360px, calc(100vw - 700px), 560px);
    background: var(--glass); border: 1px solid var(--line);
    border-radius: 10px; padding: 12px 16px 10px;
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
  }
  .sparkline .label {
    color: var(--dim); font-family: var(--mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.08em;
    display: flex; justify-content: space-between; align-items: baseline;
    margin: 0 0 6px;
  }
  .sparkline canvas {
    display: block;
    width: 100%;
    height: 40px;
  }

  footer {
    position: fixed; right: 14px; bottom: 10px; z-index: 2;
    color: var(--dim); font-family: var(--mono); font-size: 10px; opacity: 0.6;
  }

  @media (max-width: 1100px) {
    .rail { width: 280px; padding: 14px; }
    .sparkline { display: none; }
  }
  @media (max-width: 760px) {
    .rail.left { width: 100%; height: auto; bottom: auto; padding: 10px; }
    .rail.right { display: none; }
  }
</style>
</head>
<body>

<div id="globe"></div>
<div id="vignette"></div>

<aside class="rail left">
  <section class="panel title">
    <h1><span class="dot"></span>Attack telemetry</h1>
    <div class="meta">
      host  <strong id="host">oracle cloud arm vm</strong><br/>
      origin <strong id="home-loc">—</strong><br/>
      window <strong id="window-days">—</strong>d ·
      gen <strong id="gen-at">—</strong>
    </div>
  </section>

  <section class="panel">
    <h2>Last <span id="w2"></span>d</h2>
    <div class="stats">
      <div class="stat"><div class="num accent" id="s-attempts">–</div><div class="label">attempts</div></div>
      <div class="stat"><div class="num" id="s-ips">–</div><div class="label">unique IPs</div></div>
      <div class="stat"><div class="num" id="s-countries">–</div><div class="label">countries</div></div>
      <div class="stat"><div class="num good" id="s-success">0</div><div class="label">breaches</div></div>
    </div>
  </section>

  <section class="panel">
    <h2>By country</h2>
    <table id="top-countries">
      <thead><tr><th>Country</th><th class="n">Hits</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>

  <section class="panel" style="flex: 0 0 auto;">
    <h2>Top usernames tried</h2>
    <div class="users" id="top-users"></div>
  </section>
</aside>

<aside class="rail right">
  <section class="panel" style="flex: 0 1 auto; max-height: 50vh; display: flex; flex-direction: column;">
    <h2>Top source IPs</h2>
    <div style="overflow:auto; flex:1;">
      <table id="top-ips">
        <thead><tr><th>IP</th><th>Loc</th><th class="n">Hits</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <section class="panel" style="flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0;">
    <h2>Live feed</h2>
    <div class="feed"><div class="feed-inner" id="feed"></div></div>
  </section>
</aside>

<div class="sparkline panel">
  <div class="label"><span>Attempts / hour</span><span id="spark-max"></span></div>
  <canvas id="spark"></canvas>
</div>

<footer>
  <a href="/" style="color:inherit;text-decoration:none;border-bottom:1px dotted currentColor">← networkshard.com</a>
  &nbsp;·&nbsp; data: journalctl + ip-api.com
  &nbsp;·&nbsp; <a href="/blog/ssh-brute-force-telemetry/" style="color:inherit;text-decoration:none;border-bottom:1px dotted currentColor">read the blog</a>
</footer>

<script>
// HTML-escape all attacker-influenced strings before inserting via innerHTML.
// SSH usernames are arbitrary and end up in attacks.json verbatim; geo strings
// from ip-api.com are third-party. Treat both as untrusted at the render layer.
const ESC_MAP = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;', '`': '&#96;' };
const esc = (s) => String(s ?? '').replace(/[&<>"'`]/g, c => ESC_MAP[c]);

const flag = (cc) => {
  if (!cc || cc === '??' || cc.length !== 2) return '🏴';
  // cc is an alpha country code; whitelist before treating as a flag
  if (!/^[A-Za-z]{2}$/.test(cc)) return '🏴';
  return String.fromCodePoint(...[...cc.toUpperCase()].map(c => 0x1F1A5 + c.charCodeAt(0)));
};
const fmt = (n) => n.toLocaleString();

(async () => {
  const data = await fetch('attacks.json?_=' + Date.now()).then(r => r.json());

  // --- meta -----------------------------------------------------------------
  const home = data.home || { lat: 19.07, lon: 72.88, city: 'Mumbai', country: 'India', cc: 'IN' };
  document.getElementById('home-loc').textContent =
    `${flag(home.cc)} ${[home.city, home.country].filter(Boolean).join(', ')}`;
  document.getElementById('window-days').textContent = data.window_days;
  document.getElementById('w2').textContent = data.window_days;
  document.getElementById('gen-at').textContent =
    new Date(data.generated_at).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  document.getElementById('s-attempts').textContent = fmt(data.total_attempts);
  document.getElementById('s-ips').textContent = fmt(data.unique_ips);
  document.getElementById('s-countries').textContent = fmt(data.unique_countries);

  // --- globe ----------------------------------------------------------------
  const points = Object.entries(data.ip_geo).map(([ip, g]) => ({
    lat: g.lat, lng: g.lon, n: g.n, ip,
    label: `<div style="font-family:ui-monospace,monospace;font-size:11px;background:rgba(12,18,28,0.85);border:1px solid rgba(120,160,200,0.28);padding:6px 9px;border-radius:6px;backdrop-filter:blur(10px);">
              <span style="color:#4cc9f0">${esc(ip)}</span> <span style="color:#ff5b6e;font-weight:600">${Number(g.n) || 0}×</span><br/>
              <span style="color:#dde6f2">${esc([g.city, g.country].filter(Boolean).join(', '))}</span><br/>
              <span style="color:#7a8aa3">${esc((g.org || '').slice(0,42))}</span>
            </div>`,
  }));

  const arcs = points.map(p => ({
    startLat: p.lat, startLng: p.lng,
    endLat: home.lat, endLng: home.lon,
    n: p.n,
  }));

  const maxN = Math.max(1, ...points.map(p => p.n));

  // group attackers by city to dedupe label clutter
  const cityMap = new Map();
  Object.entries(data.ip_geo).forEach(([ip, g]) => {
    if (!g.city) return;
    const key = `${g.city}|${g.country}`;
    if (!cityMap.has(key)) cityMap.set(key, { city: g.city, country: g.country, lat: g.lat, lng: g.lon, n: 0, ips: 0 });
    const c = cityMap.get(key);
    c.n += g.n;
    c.ips += 1;
    // jitter labels slightly so co-located cities don't overlap exactly
    c.lat = g.lat; c.lng = g.lon;
  });
  const labels = [...cityMap.values()]
    .sort((a, b) => b.n - a.n)
    .slice(0, 20); // top 20 cities only to keep it readable

  // also label home
  labels.push({ city: home.city || 'Mumbai', country: home.country, lat: home.lat, lng: home.lon, n: 0, isHome: true });

  const globe = Globe()
    (document.getElementById('globe'))
    .globeImageUrl('img/earth-night.jpg')
    .bumpImageUrl('img/earth-topology.png')
    .backgroundImageUrl('img/night-sky.png')
    .showGraticules(true)
    .atmosphereColor('#4cc9f0')
    .atmosphereAltitude(0.22)
    .pointsData(points)
    .pointLat('lat').pointLng('lng')
    .pointAltitude(d => 0.005 + 0.18 * Math.sqrt(d.n / maxN))
    .pointRadius(d => 0.18 + 0.55 * Math.sqrt(d.n / maxN))
    .pointColor(() => '#ff5b6e')
    .pointLabel('label')
    .pointResolution(10)
    .labelsData(labels)
    .labelLat('lat').labelLng('lng')
    .labelText(d => d.isHome ? `◉ ${d.city}` : d.city)
    .labelSize(d => d.isHome ? 0.5 : 0.32 + 0.25 * Math.min(1, d.n / maxN))
    .labelDotRadius(0)
    .labelColor(d => d.isHome ? '#6ee7b7' : 'rgba(220,230,242,0.92)')
    .labelResolution(2)
    .labelAltitude(0.012)
    .arcsData(arcs)
    .arcStartLat('startLat').arcStartLng('startLng')
    .arcEndLat('endLat').arcEndLng('endLng')
    .arcColor(() => ['rgba(255,91,110,0.05)', 'rgba(255,91,110,0.85)'])
    .arcStroke(0.35)
    .arcDashLength(0.35)
    .arcDashGap(1.4)
    .arcDashAnimateTime(d => 1800 + Math.random() * 1500)
    .arcAltitudeAutoScale(0.5);

  // home marker
  globe.htmlElementsData([{ ...home, type: 'home' }])
    .htmlLat('lat').htmlLng('lon')
    .htmlAltitude(0.01)
    .htmlElement(() => {
      const el = document.createElement('div');
      el.innerHTML = `
        <div style="position:relative;width:14px;height:14px;">
          <div style="position:absolute;inset:0;background:#6ee7b7;border-radius:50%;box-shadow:0 0 12px #6ee7b7;"></div>
          <div style="position:absolute;inset:-6px;border:1px solid #6ee7b7;border-radius:50%;animation:ring 2s infinite;"></div>
        </div>
        <style>@keyframes ring { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2.4); opacity: 0; } }</style>`;
      return el;
    });

  globe.controls().autoRotate = true;
  globe.controls().autoRotateSpeed = 0.35;
  globe.controls().enableZoom = true;
  globe.controls().minDistance = 180;
  globe.controls().maxDistance = 600;

  // initial camera over home
  globe.pointOfView({ lat: home.lat, lng: home.lon, altitude: 2.4 }, 0);

  window.addEventListener('resize', () => {
    globe.width(window.innerWidth).height(window.innerHeight);
  });
  globe.width(window.innerWidth).height(window.innerHeight);

  // --- countries ------------------------------------------------------------
  const ccToName = {};
  data.top_ips.forEach(r => { if (r.cc && r.country) ccToName[r.cc] = r.country; });
  const tC = document.querySelector('#top-countries tbody');
  data.top_countries.slice(0, 10).forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML =
      `<td><span class="flag">${flag(r.cc)}</span>${esc((ccToName[r.cc] || r.cc).slice(0, 22))}</td>` +
      `<td class="n">${fmt(Number(r.count) || 0)}</td>`;
    tC.appendChild(tr);
  });

  // --- top ips --------------------------------------------------------------
  const tIp = document.querySelector('#top-ips tbody');
  data.top_ips.slice(0, 20).forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML =
      `<td><span class="ip">${esc(r.ip)}</span></td>` +
      `<td><span class="flag">${flag(r.cc)}</span>${esc((r.city || r.country || '—').slice(0, 14))}</td>` +
      `<td class="n">${fmt(Number(r.count) || 0)}</td>`;
    tIp.appendChild(tr);
  });

  // --- top users ------------------------------------------------------------
  // Usernames come straight from SSH login attempts and are 100% attacker-controlled.
  // Build the pill with textContent for the username; only the count is trusted.
  const u = document.getElementById('top-users');
  data.top_users.slice(0, 14).forEach(r => {
    const p = document.createElement('span');
    p.className = 'pill';
    p.textContent = String(r.user ?? '');
    const n = document.createElement('span');
    n.className = 'n';
    n.textContent = fmt(Number(r.count) || 0);
    p.appendChild(n);
    u.appendChild(p);
  });

  // --- live feed ------------------------------------------------------------
  const feed = document.getElementById('feed');
  data.recent.slice().reverse().forEach(e => {
    const d = new Date(e.ts);
    const t = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const date = (d.getMonth() + 1) + '/' + d.getDate();
    const row = document.createElement('div');
    row.className = 'feed-row';
    row.innerHTML =
      `<span class="t">${esc(date + ' ' + t)}</span>` +
      `<span><span class="ip">${esc(e.ip)}</span> <span class="u">${esc((e.user || '-').slice(0, 14))}</span> ` +
      `<span class="c">${flag(e.cc)} ${esc((e.country || '?').slice(0, 14))}</span></span>`;
    feed.appendChild(row);
  });

  // --- sparkline ------------------------------------------------------------
  const cv = document.getElementById('spark');
  const series = data.hourly;
  function drawSpark() {
    const ctx = cv.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const w = cv.clientWidth, h = cv.clientHeight;
    if (!w || !h) return;
    cv.width = w * dpr; cv.height = h * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, w, h);
    if (!series.length) return;
    const minT = series[0].t, maxT = series[series.length - 1].t;
    const maxV = Math.max(...series.map(p => p.n));
    document.getElementById('spark-max').textContent = `peak ${maxV}/hr`;

    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, 'rgba(255,91,110,0.55)');
    grad.addColorStop(1, 'rgba(255,91,110,0.02)');

    const pad = 1; // keep stroke inside the canvas
    const xy = (p) => [
      ((p.t - minT) / (maxT - minT || 1)) * (w - pad * 2) + pad,
      h - pad - (p.n / maxV) * (h - pad * 2),
    ];

    ctx.beginPath();
    series.forEach((p, i) => { const [x, y] = xy(p); i ? ctx.lineTo(x, y) : ctx.moveTo(x, y); });
    ctx.lineTo(w - pad, h); ctx.lineTo(pad, h); ctx.closePath();
    ctx.fillStyle = grad; ctx.fill();

    ctx.beginPath();
    series.forEach((p, i) => { const [x, y] = xy(p); i ? ctx.lineTo(x, y) : ctx.moveTo(x, y); });
    ctx.strokeStyle = '#ff5b6e'; ctx.lineWidth = 1.2; ctx.stroke();
  }
  drawSpark();
  let _sparkTimer;
  window.addEventListener('resize', () => {
    clearTimeout(_sparkTimer);
    _sparkTimer = setTimeout(drawSpark, 80);
  });
})();
</script>
</body>
</html>
